services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: maya_public
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ..
      dockerfile: apps/maya-gateway/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/maya_public
    command: >
      sh -c "cd /app/packages/maya-db && uv run alembic upgrade head"
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    build:
      context: ..
      dockerfile: apps/maya-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/maya_public
      ENV: development
      PORT: "8080"
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
