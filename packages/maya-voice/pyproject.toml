[project]
name = "maya-voice"
version = "0.1.0"
description = "Voice assistant turn loop and eval harness — assimilated from voice-agent"
requires-python = ">=3.11"
dependencies = [
    "maya-contracts",
    "maya-llm",
    "pydantic>=2.0",
]

[tool.uv.sources]
maya-contracts = { workspace = true }
maya-llm = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/maya_voice"]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[project.scripts]
maya-voice-eval = "maya_voice.eval:main"
