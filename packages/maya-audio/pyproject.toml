[project]
name = "maya-audio"
version = "0.1.0"
description = "Maya audio bounded context — ASR/TTS backends, realtime stream sessions, batch jobs"
requires-python = ">=3.11"
dependencies = [
    "maya-contracts",
    "maya-llm",
    "numpy>=1.26",
    "pydantic>=2.0",
]

[tool.uv.sources]
maya-contracts = { workspace = true }
maya-llm = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/maya_audio"]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "jiwer>=3.0"]
# Routing extra — pulled in by apps that mount the FastAPI router.
http = ["fastapi>=0.110"]
gpu = [
    "faster-whisper>=1.0",
    "jiwer>=3.0",
    "torch",
    "nemo_toolkit[asr]",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
