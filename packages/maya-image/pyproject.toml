[project]
name = "maya-image"
version = "0.1.0"
description = "ComfyUI-backed image generation and arena orchestration for Maya"
requires-python = ">=3.11"
dependencies = [
    "maya-db",
    "arena-core",
    "httpx>=0.27",
    "aiohttp>=3.9",
    "pillow>=10.0",
    "pydantic>=2.0",
    "structlog>=24.0",
    "sqlalchemy>=2.0",
    "opentelemetry-api>=1.20",
    "fastapi>=0.110",
    "jinja2>=3.1",
]

[project.optional-dependencies]
hosted = [
    "fal-client",
]
redis = [
    "redis>=5.0",
]

[project.scripts]
maya-image = "maya_image.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/maya_image"]

[tool.hatch.build.targets.wheel.force-include]
"src/maya_image/templates" = "maya_image/templates"

[tool.uv.sources]
maya-db = { workspace = true }
arena-core = { workspace = true }
