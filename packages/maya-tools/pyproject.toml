[project]
name = "maya-tools"
version = "0.1.0"
description = "Tool-reliability runtime — typed contracts, retries, circuit breakers. Generic + public-safe."
requires-python = ">=3.11"
dependencies = [
    "maya-contracts",
    "structlog>=24.0",
    "opentelemetry-api>=1.20",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/maya_tools"]

[tool.uv.sources]
maya-contracts = { workspace = true }
